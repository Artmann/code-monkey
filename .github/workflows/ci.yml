name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun:
    name: bun / ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck, lint, test:run]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node is present on the runner by default; pin it for deterministic
      # native-module builds so `npm rebuild` below targets a known ABI.
      - name: Setup Node (for native rebuild)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (bun)
        run: bun install --frozen-lockfile

      - name: Rebuild native modules
        if: matrix.check == 'test:run'
        run: npm rebuild better-sqlite3

      - name: Run ${{ matrix.check }}
        run: bun run ${{ matrix.check }}

  node:
    name: node ${{ matrix.node-version }} / ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
        check: [typecheck, lint, test:run]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (bun)
        run: bun install --frozen-lockfile

      - name: Rebuild native modules for Node ${{ matrix.node-version }}
        if: matrix.check == 'test:run'
        run: npm rebuild better-sqlite3

      - name: Run ${{ matrix.check }}
        run: npm run ${{ matrix.check }}
